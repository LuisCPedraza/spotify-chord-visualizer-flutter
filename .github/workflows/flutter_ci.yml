name: Flutter CI

on:
  push:
    branches:
      - main
      - develop
      - 'hu-*'
    paths:
      - 'app_movil_spotify/**'
      - '.github/workflows/flutter_ci.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'app_movil_spotify/**'
      - '.github/workflows/flutter_ci.yml'

jobs:
  analyze_and_test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: app_movil_spotify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable
          cache: true
          cache-key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
          cache-path: ${{ runner.tool_cache }}/flutter

      - name: Create CI env file
        run: |
          cat << 'EOF' > .env
          SPOTIFY_CLIENT_ID=ci-placeholder
          EOF

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Unit and Widget Tests
        run: flutter test --no-pub

      - name: Integration Test
        run: flutter test -d linux integration_test/app_flow_test.dart --no-pub --reporter=expanded
